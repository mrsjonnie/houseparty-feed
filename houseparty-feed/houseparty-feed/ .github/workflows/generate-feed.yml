name: Generate Triple J House Party RSS Feed

on:
  schedule:
    - cron: "0 20 * * 5"   # Vrijdag 20:00 UTC (zaterdag 06:00 AEST)
    - cron: "0 20 * * 6"   # Zaterdag 20:00 UTC (zondag 06:00 AEST)
  workflow_dispatch:       # Staat handmatig uitvoeren toe

permissions:
  contents: write          # Nodig om naar de repo te pushen

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Fix voor Node.js 20‑deprecatie
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yt-dlp requests beautifulsoup4
          yt-dlp --version

      - name: Generate RSS feed
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python generate_feed.py

      - name: Commit and push feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "Update RSS feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
