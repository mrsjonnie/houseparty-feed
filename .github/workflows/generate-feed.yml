name: Generate Triple J House Party RSS Feed

on:
  schedule:
    - cron: "0 20 * * 5"
    - cron: "0 20 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yt-dlp requests
      - run: python generate_feed.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet && echo "Geen wijzigingen" || (git commit -m "Update RSS feed" && git pull --rebase origin main && git push)
