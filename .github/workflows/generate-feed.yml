name: Generate Triple J House Party RSS Feed

on:
  schedule:
    - cron: "0 20 * * 5"   # vrijdag 20:00 UTC
    - cron: "0 20 * * 6"   # zaterdag 20:00 UTC
  workflow_dispatch:       # handmatig uitvoeren mogelijk

permissions:
  contents: write          # nodig om naar de repo te pushen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volledige geschiedenis voor pull‑rebase
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yt-dlp requests   # <-- requests toegevoegd
      - run: python generate_feed.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet && echo "Geen wijzigingen" || \
            (git commit -m "Update RSS feed $(date -u '+%Y-%m-%d %H:%M UTC')" && \
             git pull --rebase origin main && git push)
